substitutions:
  _VITE_IDENTITY_API_URL: ""
  _VITE_INVENTORY_API_URL: ""
  _VITE_INTELLIGENCE_API_URL: ""
  _VITE_FIREBASE_API_KEY: ""
  _VITE_FIREBASE_AUTH_DOMAIN: ""
  _VITE_FIREBASE_PROJECT_ID: ""
  _VITE_FIREBASE_STORAGE_BUCKET: ""
  _VITE_FIREBASE_MESSAGING_SENDER_ID: ""
  _VITE_FIREBASE_APP_ID: ""

steps:
  - id: Build static bundle
    name: node:20
    entrypoint: bash
    args:
      - -c
      - |
        export VITE_IDENTITY_API_URL="${_VITE_IDENTITY_API_URL}"
        export VITE_INVENTORY_API_URL="${_VITE_INVENTORY_API_URL}"
        export VITE_INTELLIGENCE_API_URL="${_VITE_INTELLIGENCE_API_URL}"
        export VITE_FIREBASE_API_KEY="${_VITE_FIREBASE_API_KEY}"
        export VITE_FIREBASE_AUTH_DOMAIN="${_VITE_FIREBASE_AUTH_DOMAIN}"
        export VITE_FIREBASE_PROJECT_ID="${_VITE_FIREBASE_PROJECT_ID}"
        export VITE_FIREBASE_STORAGE_BUCKET="${_VITE_FIREBASE_STORAGE_BUCKET}"
        export VITE_FIREBASE_MESSAGING_SENDER_ID="${_VITE_FIREBASE_MESSAGING_SENDER_ID}"
        export VITE_FIREBASE_APP_ID="${_VITE_FIREBASE_APP_ID}"
        npm ci
        npm run build

  - id: Deploy to App Engine Standard
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: bash
    args:
      - -c
      - |
        gcloud app deploy app.yaml \
          --quiet

options:
  logging: CLOUD_LOGGING_ONLY
